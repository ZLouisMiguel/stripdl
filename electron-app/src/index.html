<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' file: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'"
    />
    <title>Strip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-theme="light">
    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">strip</span>
      </div>
      <ul class="nav-links">
        <li>
          <a href="#" data-view="library" class="nav-link active">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            Library
          </a>
        </li>
        <li>
          <!--
            Clicking "Download" in the nav opens/focuses the download tray
            rather than switching to a separate full-page view.
          -->
          <a
            href="#"
            data-action="open-tray"
            class="nav-link"
            id="nav-download"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M12 3v13M7 11l5 5 5-5" />
              <path d="M5 20h14" />
            </svg>
            Download
            <!-- Badge shows count of active jobs -->
            <span
              class="nav-download-badge"
              id="nav-download-badge"
              style="display: none"
            ></span>
          </a>
        </li>
        <li>
          <a href="#" data-view="settings" class="nav-link">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"
              />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2" />
            </svg>
            Settings
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <button id="theme-toggle" title="Toggle theme">
          <svg
            class="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            class="icon-moon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- ── Main content area ────────────────────────────────── -->
    <main id="main">
      <!-- Library view -->
      <section id="view-library" class="view active">
        <header class="view-header">
          <h1>Library</h1>
          <div class="header-actions">
            <button class="btn btn-primary" id="btn-add-download">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add Comic
            </button>
            <button
              class="btn btn-ghost"
              id="btn-refresh-library"
              title="Refresh"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <polyline points="1 4 1 10 7 10" />
                <path d="M3.51 15a9 9 0 1 0 .49-3.36" />
              </svg>
            </button>
          </div>
        </header>
        <div id="library-grid" class="series-grid">
          <div class="empty-state" id="library-empty">
            <div class="empty-icon">◈</div>
            <p>Your library is empty.</p>
            <p class="muted">Download a webtoon to get started.</p>
            <button class="btn btn-primary" id="btn-empty-download">
              Download something
            </button>
          </div>
        </div>
      </section>

      <!-- Series detail view -->
      <section id="view-series" class="view">
        <button class="btn btn-ghost back-btn" id="btn-back-library">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Library
        </button>
        <div id="series-detail"></div>
      </section>

      <!-- Reader view -->
      <section id="view-reader" class="view reader-view">
        <div id="reader-toolbar">
          <button class="btn btn-ghost" id="btn-back-series">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
            Back
          </button>
          <div class="reader-chapter-nav">
            <button
              class="btn btn-ghost icon-btn"
              id="btn-prev-chapter"
              title="Previous chapter"
              disabled
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
            <span id="reader-title" class="reader-title-text"></span>
            <button
              class="btn btn-ghost icon-btn"
              id="btn-next-chapter"
              title="Next chapter"
              disabled
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>
          <div class="reader-controls">
            <span id="reader-page-info"></span>
          </div>
        </div>

        <div id="reader-container">
          <div id="reader-pages"></div>
        </div>

        <div id="chapter-end-overlay" aria-hidden="true">
          <div class="chapter-end-card">
            <div class="chapter-end-label">End of chapter</div>
            <div class="chapter-end-title" id="chapter-end-title"></div>
            <div class="chapter-end-actions">
              <button class="btn btn-ghost" id="btn-end-prev-chapter" disabled>
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 15px; height: 15px"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
                Previous
              </button>
              <button class="btn btn-ghost" id="btn-end-back">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 15px; height: 15px"
                >
                  <rect x="3" y="3" width="7" height="9" rx="1" />
                  <rect x="14" y="3" width="7" height="5" rx="1" />
                  <rect x="14" y="12" width="7" height="9" rx="1" />
                  <rect x="3" y="16" width="7" height="5" rx="1" />
                </svg>
                Chapter list
              </button>
              <button
                class="btn btn-primary"
                id="btn-end-next-chapter"
                disabled
              >
                Next chapter
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="width: 15px; height: 15px"
                >
                  <polyline points="9 18 15 12 9 6" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- Settings view -->
      <section id="view-settings" class="view">
        <header class="view-header"><h1>Settings</h1></header>
        <div class="settings-wrap">
          <div class="settings-group card">
            <h2 class="settings-group-title">Storage</h2>
            <div class="setting-row">
              <div>
                <div class="setting-label">Download folder</div>
                <div class="setting-value muted" id="setting-download-dir">
                  —
                </div>
              </div>
              <button class="btn btn-secondary" id="btn-change-folder">
                Change
              </button>
            </div>
          </div>
          <div class="settings-group card">
            <h2 class="settings-group-title">Appearance</h2>
            <div class="setting-row">
              <div class="setting-label">Theme</div>
              <select class="select" id="setting-theme">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
          </div>
          <div class="settings-group card">
            <h2 class="settings-group-title">About</h2>
            <p class="muted">strip v0.2.0 — webtoon downloader &amp; reader</p>
          </div>
        </div>
      </section>
    </main>

    <!-- ── Download Tray ────────────────────────────────────────
         Sits outside #main so it overlays all views.
         Collapsed by default; expands on demand.
         Never navigates away from the current view.
    ─────────────────────────────────────────────────────────── -->
    <div id="download-tray" class="download-tray" aria-label="Download tray">
      <!-- Tray header bar (always visible when tray is open) -->
      <div class="tray-header" id="tray-header">
        <div class="tray-header-left">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            class="tray-icon"
          >
            <path d="M12 3v13M7 11l5 5 5-5" />
            <path d="M5 20h14" />
          </svg>
          <span class="tray-title">Downloads</span>
          <span class="tray-job-count" id="tray-job-count"></span>
        </div>
        <div class="tray-header-right">
          <button
            class="btn btn-ghost icon-btn tray-collapse-btn"
            id="tray-collapse-btn"
            title="Collapse"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="width: 14px; height: 14px"
            >
              <polyline points="18 15 12 9 6 15" />
            </svg>
          </button>
          <button
            class="btn btn-ghost icon-btn"
            id="tray-close-btn"
            title="Close tray"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="width: 14px; height: 14px"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Tray body: input form + job list -->
      <div class="tray-body" id="tray-body">
        <!-- New download form -->
        <div class="tray-form" id="tray-form">
          <div class="tray-form-row">
            <input
              type="url"
              id="tray-url"
              class="input tray-input"
              placeholder="https://www.webtoons.com/en/…"
              aria-label="Webtoon URL"
            />
            <input
              type="text"
              id="tray-chapters"
              class="input tray-input tray-chapters-input"
              placeholder="Chapters: 1-20 or 1,3,5 (optional)"
              aria-label="Chapter range"
            />
            <button class="btn btn-primary tray-start-btn" id="tray-start-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                style="width: 14px; height: 14px"
              >
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              Start
            </button>
          </div>
          <div
            class="tray-form-error"
            id="tray-form-error"
            style="display: none"
          ></div>
        </div>

        <!-- Active / recent jobs list -->
        <div class="tray-jobs" id="tray-jobs">
          <!-- Job entries injected by JS -->
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
